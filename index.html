<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 NBA Playoff Picks</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #111; min-height: 100vh; }
  body.dark { background: #0f0f0f; color: #eee; }

  .page { max-width: 1100px; margin: 0 auto; padding: 1.25rem 1rem 3rem; }

  /* Deadline */
  .deadline-bar { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 12px; padding: 12px 16px; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  body.dark .deadline-bar { background: #1a1a1a; border-color: #333; }
  .deadline-bar label { font-size: 12px; font-weight: 500; color: #666; white-space: nowrap; }
  .deadline-display { font-size: 13px; color: #111; font-weight: 500; flex: 1; }
  body.dark .deadline-display { color: #eee; }
  .deadline-sub { font-size: 11px; color: #999; flex: 1; }

  /* Toolbar */
  .toolbar { display: flex; align-items: center; gap: 6px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .app-title { font-size: 19px; font-weight: 500; color: #111; margin-right: 4px; }
  body.dark .app-title { color: #eee; }
  .t-divider { width: 0.5px; height: 20px; background: #ddd; margin: 0 2px; }
  body.dark .t-divider { background: #444; }
  .tool-btn { padding: 5px 13px; border-radius: 8px; border: 0.5px solid #ddd; background: transparent; font-size: 12px; color: #666; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
  body.dark .tool-btn { border-color: #444; color: #aaa; }
  .tool-btn:hover { background: #f0f0f0; border-color: #bbb; }
  body.dark .tool-btn:hover { background: #2a2a2a; }
  .tool-btn.active { background: #fff; border-color: #999; color: #111; font-weight: 500; }
  body.dark .tool-btn.active { background: #2a2a2a; border-color: #666; color: #eee; }

  /* Status bar */
  .status-bar { font-size: 11px; color: #999; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #ccc; }
  .status-dot.live { background: #22c55e; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* Panel */
  .panel { background: #f0f0f0; border: 0.5px solid #e0e0e0; border-radius: 12px; padding: 16px; margin-bottom: 1.25rem; display: none; }
  body.dark .panel { background: #1a1a1a; border-color: #333; }
  .panel.open { display: block; }
  .panel-title { font-size: 13px; font-weight: 500; color: #111; margin-bottom: 12px; }
  body.dark .panel-title { color: #eee; }
  .panel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 9px; }
  .panel-card { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 8px; padding: 10px 12px; }
  body.dark .panel-card { background: #222; border-color: #333; }
  .panel-card-label { font-size: 11px; color: #777; margin-bottom: 7px; }
  .pick-sel, .win-sel { font-size: 12px; padding: 4px 6px; border-radius: 8px; border: 0.5px solid #ddd; background: #fff; color: #111; width: 100%; }
  body.dark .pick-sel, body.dark .win-sel { background: #1a1a1a; border-color: #444; color: #eee; }
  .admin-row { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; }
  .admin-row label { flex: 1; font-size: 12px; color: #333; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  body.dark .admin-row label { color: #ccc; }
  .admin-row input[type="number"] { width: 54px; padding: 3px 5px; border-radius: 8px; border: 0.5px solid #ddd; background: #fff; color: #111; font-size: 12px; }
  body.dark .admin-row input[type="number"] { background: #1a1a1a; border-color: #444; color: #eee; }

  /* Buttons */
  .save-btn { padding: 5px 12px; border-radius: 8px; border: 0.5px solid #ddd; background: transparent; font-size: 12px; color: #666; cursor: pointer; }
  .save-btn:hover { background: #f0f0f0; }
  body.dark .save-btn { border-color: #444; color: #aaa; }
  body.dark .save-btn:hover { background: #2a2a2a; }
  .primary-btn { padding: 6px 14px; border-radius: 8px; border: none; background: #111; color: #fff; font-size: 12px; font-weight: 500; cursor: pointer; }
  body.dark .primary-btn { background: #eee; color: #111; }

  body.dark .ptab { background: #222; border-color: #444; color: #aaa; }
  .ptab.active { background: #fff; color: #111; border-color: #999; font-weight: 500; }
  body.dark .ptab.active { background: #2a2a2a; color: #eee; border-color: #666; }

  /* Rounds */
  .round-section { margin-bottom: 1.75rem; }

  body.dark .b-final { background: #2a2a2a; color: #aaa; }
  .b-upcoming { background: #f0f0f0; color: #999; }
  body.dark .b-upcoming { background: #2a2a2a; color: #888; }
  .b-tonight { background: #fef3c7; color: #92400e; }
  .b-tbd { background: #f0f0f0; color: #999; font-style: italic; }
  body.dark .b-tbd { background: #2a2a2a; color: #777; }
  .m-label { font-size: 11px; color: #aaa; }

  /* Team rows */
  .team-row { display: flex; align-items: center; justify-content: space-between; padding: 4px 6px; border-radius: 8px; margin-bottom: 3px; }
  .tl { display: flex; align-items: center; gap: 6px; }
  .seed { font-size: 10px; color: #aaa; min-width: 11px; }
  .tname { font-size: 13px; color: #111; }
  body.dark .tname { color: #eee; }
  .tscore { font-size: 12px; font-weight: 500; min-width: 28px; text-align: right; color: #888; }

  .vs-hr { border: none; border-top: 0.5px solid #eee; margin: 2px 0; }
  body.dark .vs-hr { border-color: #2a2a2a; }
  .picked-bg { background: #f7f7f7; }
  body.dark .picked-bg { background: #222; }

  /* Pick colors */
  .pick-correct .tname { color: #16a34a !important; font-weight: 500; }
  .pick-correct .tscore { color: #16a34a !important; }

  .pick-wrong .tname { color: #dc2626 !important; font-weight: 500; }
  .pick-wrong .tscore { color: #dc2626 !important; }
  .pick-wrong .dot { background: #dc2626 !important; }
  .pick-pending .dot { background: #9ca3af !important; }

  /* Pick % bars */
  .pct-bar-wrap { margin-top: 8px; border-top: 0.5px solid #eee; padding-top: 7px; display: flex; flex-direction: column; gap: 3px; }
  body.dark .pct-bar-wrap { border-color: #2a2a2a; }
  .pct-row { display: flex; align-items: center; gap: 6px; }
  .pct-tname { font-size: 11px; color: #888; min-width: 110px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .pct-bar-bg { flex: 1; height: 5px; border-radius: 3px; background: #eee; overflow: hidden; }
  body.dark .pct-bar-bg { background: #333; }
  .pct-bar-fill { height: 100%; border-radius: 3px; }
  .pct-val { font-size: 10px; color: #aaa; min-width: 26px; text-align: right; }
  .pct-pickers { font-size: 10px; color: #bbb; margin-bottom: 2px; padding-left: 116px; }

  /* Standings */
  .scoring-key { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 12px; padding: 12px 16px; margin-bottom: 1.25rem; }
  body.dark .scoring-key { background: #1a1a1a; border-color: #2e2e2e; }

  .sc-chip { font-size: 11px; color: #777; background: #f5f5f5; border: 0.5px solid #e0e0e0; border-radius: 8px; padding: 3px 8px; }
  body.dark .sc-chip { background: #222; border-color: #333; color: #aaa; }

  body.dark .sc-chip b { color: #eee; }
  .standing-card { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 12px; padding: 14px 16px; margin-bottom: 8px; }

  body.dark .admin-login { background: #1a1a1a; border-color: #333; }
  .admin-login h3 { font-size: 14px; font-weight: 500; margin-bottom: 12px; color: #111; }
  body.dark .admin-login h3 { color: #eee; }

  .loading { text-align: center; padding: 2rem; color: #999; font-size: 14px; }
  .loading-spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #ddd; border-top-color: #666; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Toast */
  .toast { position: fixed; bottom: 24px; right: 24px; background: #111; color: #fff; padding: 10px 16px; border-radius: 8px; font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; }
  body.dark .toast { background: #eee; color: #111; }
  .toast.show { opacity: 1; }

  /* Dark mode toggle */
  .dark-toggle { margin-left: auto; font-size: 18px; cursor: pointer; background: none; border: none; padding: 2px 6px; border-radius: 6px; }
  .dark-toggle:hover { background: #eee; }
  body.dark .dark-toggle:hover { background: #2a2a2a; }

  @media (max-width: 600px) {
    .toolbar { gap: 4px; }
    .tool-btn { padding: 4px 9px; font-size: 11px; }
    .app-title { font-size: 16px; }
  }
</style>
</head>
<body>

<div class="page">

  <div class="deadline-bar" id="deadlineBar">
    <label>📅 Picks deadline:</label>
    <div id="deadlineDisplay" style="flex:1;"></div>
  </div>

    <span class="app-title">🏀 2026 NBA Playoffs</span>

    <div class="t-divider" id="adminDivider" style="display:none;"></div>
    <button class="tool-btn" id="btnPicks" style="display:none;" onclick="togglePanel('picks')">✏ Edit picks</button>
    <button class="tool-btn" id="btnAdmin" style="display:none;" onclick="togglePanel('admin')">⚙ Edit results</button>

    <button class="dark-toggle" onclick="toggleDark()" title="Toggle dark mode">🌙</button>

  <div class="status-bar">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">Loading data...</span>
  </div>

    <div class="admin-login">

    </div>
  </div>

  <!-- Picks panel -->
  <div class="panel" id="picksPanel">

      <span id="picksStatus" style="font-size:12px;color:#999;"></span>
    </div>
  </div>

  <!-- Results panel -->
  <div class="panel" id="adminPanel">
    <div class="panel-title">Set scores & winners</div>
    <div class="panel-grid" id="adminGrid"></div>
    <div style="display:flex;gap:8px;margin-top:11px;align-items:center;">
      <button class="primary-btn" id="saveAdmin" onclick="saveAdmin()">Save results</button>
      <span id="adminStatus" style="font-size:12px;color:#999;"></span>
    </div>
  </div>

  <!-- Main views -->
  <div id="viewBracket">
    <div class="player-tabs" id="playerTabs"></div>
    <div id="bracketView"><div class="loading"><span class="loading-spinner"></span>Loading bracket...</div></div>
  </div>
  <div id="viewStandings" style="display:none;"></div>

</div>

<div class="toast" id="toast"></div>

// ---- Dark mode ----
function toggleDark() {
  document.body.classList.toggle('dark');
  localStorage.setItem('darkMode', document.body.classList.contains('dark'));
}
if (localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark');

// ---- Toast ----
function showToast(msg, duration=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

// ---- Admin ----

// ---- Load data from Sheets ----
async function loadData() {
  setStatus('loading');
  const data = await apiGet();
  if (!data) { setStatus('error'); return; }

  // Load picks
  if (data.picks && Array.isArray(data.picks)) {
    data.picks.forEach(row => {
      const p = row.player, mid = row.matchup;
      if (p && mid && picks[p] !== undefined) picks[p][mid] = row.pick || '';
    });
  }
  // Load playin picks from sheet if present
  if (data.playin_picks && Array.isArray(data.playin_picks)) {
    data.playin_picks.forEach(row => {
      const p = row.player, pid = row.matchup;
      if (p && pid && playinPicks[p] !== undefined) playinPicks[p][pid] = row.pick || '';
    });
  }
  // Load results
  if (data.results && Array.isArray(data.results)) {
    data.results.forEach(row => {
      const m = matchups.find(x => x.id === row.id);
      if (!m) return;
      m.score1 = row.score1 !== '' && row.score1 != null ? parseInt(row.score1) : null;
      m.score2 = row.score2 !== '' && row.score2 != null ? parseInt(row.score2) : null;
      m.winner = row.winner || null;
      m.seriesScore = row.seriesScore || m.seriesScore || null;
      m.latestGame = row.latestGame || m.latestGame || null;
      if (row.t2 && !row.t2.startsWith('TBD')) m.t2 = row.t2;
      if (row.t1 && !row.t1.startsWith('TBD')) m.t1 = row.t1;
    });
  }
  // Load deadline
  if (data.deadline && Array.isArray(data.deadline) && data.deadline[0]) {
    deadline.label = data.deadline[0].label || '';
  }

  lastRefresh = new Date();
  setStatus('ok');
  renderDeadline();
  renderBracket();
  renderTabs();
  if (activeMain === 'standings') renderStandings();
}

// ---- Upset detection ----
function isUpset(game, winner) {
  if (!winner || !game.winner) return false;
  if (game.round === 'playin') return false;
  if (game.round === 'r4') {
    const {t1Wins,t2Wins,t1Diff,t2Diff} = finalsRecords;
    if (t1Wins === null || t2Wins === null) return false;
    const fav = t1Wins !== t2Wins ? (t1Wins > t2Wins ? game.t1 : game.t2) : (t1Diff !== null && t2Diff !== null ? (t1Diff >= t2Diff ? game.t1 : game.t2) : null);
    return fav ? winner !== fav : false;
  }
  const ws = winner === game.t1 ? game.s1 : game.s2;
  const ls = winner === game.t1 ? game.s2 : game.s1;
  return ws !== null && ls !== null && ws > ls;
}

// ---- Scoring ----
function calcScores() {
  return PLAYERS.map(p => {
    let total = 0;
    const bd = { playin:0, r1:0, r2:0, r3:0, r4:0, upset:0 };
    PLAYIN.forEach(pg => {
      const pk = (playinPicks[p]||{})[pg.id] || '';
      if (pk && pg.winner && pk === pg.winner) { total++; bd.playin++; }
    });
    matchups.forEach(m => {
      if (!m.winner) return;
      const pk = picks[p][m.id] || '';
      if (!pk || pk !== m.winner) return;
      const base = ROUND_PTS[m.round] || 0;
      const bonus = isUpset(m, m.winner) ? (UPSET_BONUS[m.round] || 0) : 0;
      total += base + bonus;
      bd[m.round] = (bd[m.round] || 0) + base;
      bd.upset += bonus;
    });
    return { player:p, total, bd };
  }).sort((a,b) => b.total - a.total);
}

// ---- Pick % ----
function getPickPct(mid) {
  const m = matchups.find(x=>x.id===mid);
  if (!m || m.t1.startsWith('TBD') || m.t2.startsWith('TBD')) return null;
  let c1=0,c2=0,p1=[],p2=[];
  PLAYERS.forEach(p => { if(picks[p][mid]===m.t1){c1++;p1.push(p);}else if(picks[p][mid]===m.t2){c2++;p2.push(p);} });
  const tot=c1+c2; if(!tot) return null;
  return {t1:m.t1,t2:m.t2,pct1:Math.round(c1/tot*100),pct2:Math.round(c2/tot*100),pickers1:p1,pickers2:p2};
}
function getPlayinPct(pid) {
  const pg=PLAYIN.find(x=>x.id===pid); if(!pg) return null;
  let c1=0,c2=0,p1=[],p2=[];
  PLAYERS.forEach(p => { const v=(playinPicks[p]||{})[pid]; if(v===pg.t1){c1++;p1.push(p);}else if(v===pg.t2){c2++;p2.push(p);} });
  const tot=c1+c2; if(!tot) return null;
  return {t1:pg.t1,t2:pg.t2,pct1:Math.round(c1/tot*100),pct2:Math.round(c2/tot*100),pickers1:p1,pickers2:p2};
}

// ---- NBA playoff series auto-fetch ----
// Maps our matchup IDs to NBA.com series data using team abbreviations
const SERIES_MAP = {
  e1: {t1:'DET',t2:'ORL'}, e2: {t1:'BOS',t2:'PHI'}, e3: {t1:'NYK',t2:'ATL'}, e4: {t1:'CLE',t2:'TOR'},
  w1: {t1:'OKC',t2:'PHX'}, w2: {t1:'SAS',t2:'POR'}, w3: {t1:'DEN',t2:'MIN'}, w4: {t1:'LAL',t2:'HOU'},
};

async function fetchNBASeriesScores() {
  try {
    const res = await fetch('https://cdn.nba.com/static/json/liveData/series/series_leaders.json', { cache: 'no-store' });
    const data = await res.json();
    const series = data?.resultSets?.[0]?.rowSet || [];
    let updated = false;
    series.forEach(row => {
      // NBA series row: [leagueId, seriesId, homeTeamId, awayTeamId, homeWins, awayWins, gameLabel, ...]
      // Use team abbreviation matching
      const homeAbbr = row[4], awayAbbr = row[5], homeWins = row[6], awayWins = row[7];
      Object.entries(SERIES_MAP).forEach(([mid, teams]) => {
        const m = matchups.find(x => x.id === mid);
        if (!m || m.winner) return;
        const match = (homeAbbr === teams.t1 && awayAbbr === teams.t2) || (homeAbbr === teams.t2 && awayAbbr === teams.t1);
        if (!match) return;
        const t1wins = homeAbbr === teams.t1 ? homeWins : awayWins;
        const t2wins = homeAbbr === teams.t1 ? awayWins : homeWins;
        const newSeries = `${t1wins}-${t2wins}`;
        const label = t1wins > t2wins ? `${m.t1} lead ${t1wins}-${t2wins}` : t2wins > t1wins ? `${m.t2} lead ${t2wins}-${t1wins}` : `Series tied ${t1wins}-${t2wins}`;
        if (t1wins === 4) { m.winner = m.t1; m.score1 = 4; m.score2 = t2wins; }
        else if (t2wins === 4) { m.winner = m.t2; m.score1 = t1wins; m.score2 = 4; }
        else { m.score1 = t1wins; m.score2 = t2wins; }
        m.seriesScore = label;
        updated = true;
      });
    });
    if (updated) { renderBracket(); if (activeMain==='standings') renderStandings(); }
  } catch(e) {
    // Silently fail — data stays as-is
  }
}

          <option value="">— not yet —</option>
          <option value="${m.t1}" ${m.winner===m.t1?'selected':''}>${m.t1}</option>
          <option value="${m.t2}" ${m.winner===m.t2?'selected':''}>${m.t2}</option>
        </select></div>`:''}
    </div>`;
  });
  document.getElementById('adminGrid').innerHTML=html;
}

// ---- Standings ----
function renderStandings() {
  const scores=calcScores();
  const medals=['🥇','🥈','🥉'];
  let html=`<div class="scoring-key"><div class="scoring-key-title">Scoring system</div><div class="scoring-grid">
    <span class="sc-chip"><b>Play-in:</b> 1 pt</span>
    <span class="sc-chip"><b>Round 1:</b> 3 pts</span>
    <span class="sc-chip"><b>Semis:</b> 5 pts</span>
    <span class="sc-chip"><b>Conf Finals:</b> 7 pts</span>
    <span class="sc-chip"><b>Finals:</b> 9 pts</span>
    <span class="sc-chip"><b>Upset R1:</b> +1</span>
    <span class="sc-chip"><b>Upset R2/R3:</b> +2</span>
    <span class="sc-chip"><b>Upset Finals:</b> +3</span>
  </div></div>`;
  let prevTotal=null, rank=0;
  scores.forEach((s,i)=>{
    if(s.total!==prevTotal){rank=i+1;prevTotal=s.total;}
    const icon=medals[rank-1]||`#${rank}`;
    const chips=[
      `<span class="bd-chip ${s.bd.playin?'has':''}">Play-in: ${s.bd.playin}pt</span>`,
      `<span class="bd-chip ${s.bd.r1?'has':''}">R1: ${s.bd.r1}pt</span>`,
      `<span class="bd-chip ${s.bd.r2?'has':''}">Semis: ${s.bd.r2}pt</span>`,
      `<span class="bd-chip ${s.bd.r3?'has':''}">CF: ${s.bd.r3}pt</span>`,
      `<span class="bd-chip ${s.bd.r4?'has':''}">Finals: ${s.bd.r4}pt</span>`,
      s.bd.upset?`<span class="bd-chip has" style="color:#d97706">Upset bonus: +${s.bd.upset}</span>`:'',
    ].filter(Boolean).join('');
    html+=`<div class="standing-card ${rank===1?'gold':''}">
      <div style="display:flex;align-items:flex-start;gap:14px;">
        <div style="font-size:22px;min-width:32px;text-align:center;line-height:1.3;">${icon}</div>
        <div style="flex:1;">
          <div style="display:flex;align-items:baseline;justify-content:space-between;">
            <span style="font-size:15px;font-weight:500;">${s.player}</span>
            <div style="text-align:right;"><div class="standing-pts">${s.total}</div><div class="standing-pts-label">pts</div></div>
          </div>
          <div class="breakdown-row">${chips}</div>
        </div>
      </div>
    </div>`;
  });
  // Finals tiebreaker
  html+=`<div style="margin-top:1.5rem;background:#fff;border:0.5px solid #e0e0e0;border-radius:12px;padding:14px 16px;">
    <div style="font-size:11px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:10px;">Finals upset tiebreaker</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      ${['t1Wins','t2Wins','t1Diff','t2Diff'].map((k,i)=>`<div><label style="font-size:11px;color:#888;display:block;margin-bottom:4px;">${['Team 1 wins','Team 2 wins','Team 1 pt diff','Team 2 pt diff'][i]}</label><input type="number" id="fr_${k}" value="${finalsRecords[k]??''}" placeholder="—" style="width:80px;padding:4px 6px;border-radius:8px;border:0.5px solid #ddd;background:#fff;color:#111;font-size:12px;"></div>`).join('')}
    </div>
    <button class="save-btn" style="margin-top:10px;" onclick="saveFinalsRecords()">Save</button>
  </div>`;
  document.getElementById('viewStandings').innerHTML=html;
}
function saveFinalsRecords(){
  ['t1Wins','t2Wins','t1Diff','t2Diff'].forEach(k=>{
    const v=document.getElementById(`fr_${k}`).value;
    finalsRecords[k]=v!==''?parseFloat(v):null;
  });
  renderStandings();
}

// ---- Auto-refresh every 2 min ----
function startAutoRefresh() {
  if (autoRefreshTimer) clearInterval(autoRefreshTimer);
  autoRefreshTimer = setInterval(async () => {
    await loadData();
    await fetchNBASeriesScores();
  }, 120000);
}

// ---- Init ----
renderTabs();
renderDeadline();
loadData().then(() => {
  fetchNBASeriesScores();
  startAutoRefresh();
});
</script>
</body>
</html>
